<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f8bfd0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>给特别的人</title>
    <link rel="preload" href="assets/song.mp3" as="audio" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" id="app" aria-live="polite">
      <audio id="bgm" src="assets/song.mp3" preload="auto" loop autoplay playsinline></audio>

      <div class="sky" id="sky" aria-hidden="true"></div>

      <section class="screen envelope-screen is-active" id="envelopeScreen" aria-label="信封">
        <button class="envelope-hit" id="openEnvelope" aria-label="打开信封">
          <span class="envelope" aria-hidden="true">
            <span class="envelope-shadow"></span>
            <span class="envelope-back"></span>
            <span class="envelope-flap"></span>
            <span class="letter-peek"></span>
            <span class="envelope-side left"></span>
            <span class="envelope-side right"></span>
            <span class="envelope-bottom"></span>
            <span class="seal">
              <span class="seal-heart">
                <svg class="seal-mark" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 20.15C7.2 15.9 4.25 13.2 4.25 9.9C4.25 7.25 6.35 5.25 8.85 5.25C10.25 5.25 11.45 5.9 12 6.88C12.55 5.9 13.75 5.25 15.15 5.25C17.65 5.25 19.75 7.25 19.75 9.9C19.75 13.2 16.8 15.9 12 20.15Z"
                  />
                </svg>
              </span>
            </span>
          </span>
        </button>
      </section>

      <section class="screen letter-screen" id="letterScreen" aria-label="信纸">
        <article class="letter-card" id="letterCard">
          <span class="corner-heart top-left" aria-hidden="true"></span>
          <span class="corner-heart top-right" aria-hidden="true"></span>
          <span class="corner-heart bottom-left" aria-hidden="true"></span>
          <span class="corner-heart bottom-right" aria-hidden="true"></span>
          <div class="letter-scroll" id="letterScroll">
            <p class="letter-text" id="letterText"></p>
          </div>
          <button class="next-button" id="nextButton" aria-label="下一页">
            <span aria-hidden="true"></span>
          </button>
        </article>
      </section>

      <section class="screen promise-screen" id="promiseScreen" aria-label="问题">
        <div class="promise-panel">
          <h1>准备好和我一起共度余生了吗？</h1>
          <p class="plea" id="plea" aria-live="polite"></p>
          <div class="choices">
            <button class="choice yes" id="yesButton">我愿意</button>
            <button class="choice no" id="noButton">再想想</button>
          </div>
        </div>
      </section>

      <section class="screen finale-screen" id="finaleScreen" aria-label="庆祝">
        <canvas class="fireworks" id="fireworksCanvas" aria-hidden="true"></canvas>
        <div class="finale-hearts" id="finaleHearts" aria-hidden="true"></div>
        <div class="love-heart" aria-hidden="true">
          <svg class="love-mark" viewBox="0 0 120 108">
            <path
              d="M60 96.5C27.6 68.4 12 53.4 12 34.6C12 20.1 23.1 9.5 37 9.5C47.1 9.5 55.2 15.1 60 23.2C64.8 15.1 72.9 9.5 83 9.5C96.9 9.5 108 20.1 108 34.6C108 53.4 92.4 68.4 60 96.5Z"
            />
          </svg>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
